name: Lint

on:
  pull_request:
    paths:
      - '**.md'
      - '**.yml'
      - '**.yaml'
      - 'package.json'
      - 'tools/validate-markdown.sh'
      - 'tools/lint-frontmatter.sh'
      - 'tools/validate-workflows.sh'
      - '.github/workflows/lint.yml'
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '**.yml'
      - '**.yaml'
      - 'package.json'
      - 'tools/validate-markdown.sh'
      - 'tools/lint-frontmatter.sh'
      - 'tools/validate-workflows.sh'

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run markdownlint
        run: bash ./tools/validate-markdown.sh

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint.yml
          strict: true

  frontmatter-lint:
    name: Frontmatter Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontmatter lint
        run: bash ./tools/lint-frontmatter.sh

  workflow-syntax:
    name: Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate workflow YAML syntax
        run: bash ./tools/validate-workflows.sh
