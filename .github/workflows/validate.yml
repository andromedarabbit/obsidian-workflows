name: Validate Commands

on:
  pull_request:
    paths:
      - 'commands/**'
      - 'skills/**'
      - 'tools/**'
      - '.github/workflows/validate.yml'
  push:
    branches:
      - main
    paths:
      - 'commands/**'
      - 'skills/**'
      - 'tools/**'

jobs:
  validate-frontmatter:
    name: Validate Frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run frontmatter validation
        run: |
          chmod +x tools/check-frontmatter.sh tools/validate-fast.sh
          bash -x tools/check-frontmatter.sh || { echo "Frontmatter validation failed"; exit 1; }

      - name: Run skill frontmatter validation
        run: |
          chmod +x tools/check-skill-frontmatter.sh
          bash -x tools/check-skill-frontmatter.sh || { echo "Skill frontmatter validation failed"; exit 1; }

      - name: Upload validation errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-errors-frontmatter
          path: |
            tools/check-frontmatter.sh
            tools/check-skill-frontmatter.sh
          retention-days: 7

  validate-no-duplicates:
    name: Validate No Duplicates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run duplicate/collision validation
        run: npm run validate:no-duplicates

  validate-structure:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run structure validation
        run: |
          chmod +x tools/validate-command.sh
          bash -x tools/validate-command.sh

      - name: Upload validation errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-errors-structure
          path: |
            tools/validate-command.sh
          retention-days: 7

  validate-hook-paths:
    name: Validate Hook Paths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run hook path validation
        run: |
          chmod +x tools/validate-hook-paths.sh
          bash -x tools/validate-hook-paths.sh

      - name: Upload validation errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-errors-hook-paths
          path: |
            tools/validate-hook-paths.sh
          retention-days: 7
